name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  control-plane:
    name: Control Plane (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: control-plane
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - run: go build ./...
      - run: go test ./...
      - run: go vet ./...

  edge-proxy:
    name: Edge Proxy (TypeScript)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: edge-proxy
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
      - run: npm run typecheck
